<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pidief — Pages view variations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
body { background: #E8E0CC; }

@keyframes ribbon-pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

// ── Tokens ─────────────────────────────────────────────────
const T = {
  bg:'#FDFAF0', card:'#fff', accent:'#C17F24', accentBg:'#FEF3D6',
  text:'#1E1408', muted:'#7A5C28', faint:'#B89A60', border:'#E8D8A8', borderStrong:'#C4A86A',
};

// ── Mock data: 3 source PDFs, mixed pages ──────────────────
const SOURCES = [
  { id:'A', name:'rapport_q3.pdf',   color:'#C17F24', labelColor:'#7A4E0E', tintBg:'#FEF3D6', tintBorder:'#D4B87A', initials:'RQ', pattern:'dots'   },
  { id:'B', name:'contrat_signé.pdf',color:'#7C5BA0', labelColor:'#50397A', tintBg:'#F0E8FA', tintBorder:'#C8B0E0', initials:'CS', pattern:'lines'  },
  { id:'C', name:'facture_032.pdf',  color:'#3F8B6E', labelColor:'#2B6650', tintBg:'#E0F2EA', tintBorder:'#9FCAB8', initials:'F3', pattern:'cross'  },
];

// 12 mixed pages (interleaved import order)
const PAGES = [
  { id:1,  src:'A', title:'Couverture',          lines:3 },
  { id:2,  src:'A', title:'Sommaire',            lines:5 },
  { id:3,  src:'B', title:'Conditions générales', lines:8 },
  { id:4,  src:'A', title:'Synthèse',            lines:6 },
  { id:5,  src:'B', title:'Article 1',           lines:7 },
  { id:6,  src:'C', title:'Détail TVA',          lines:4 },
  { id:7,  src:'A', title:'Annexes',             lines:5 },
  { id:8,  src:'C', title:'Total HT',            lines:3 },
  { id:9,  src:'B', title:'Signatures',          lines:2 },
  { id:10, src:'A', title:'Glossaire',           lines:6 },
  { id:11, src:'C', title:'Mentions légales',    lines:5 },
  { id:12, src:'B', title:'Annexe contrat',      lines:7 },
];

const sourceById = (id) => SOURCES.find(s => s.id === id);

// ── Page thumbnail (basic) ─────────────────────────────────
const PageThumb = ({ idx, page, children, style }) => (
  <div style={{
    position:'relative',
    background:'#fff', borderRadius:8,
    width:'100%', aspectRatio:'0.77',
    boxShadow:'0 1px 3px rgba(30,20,8,0.08), 0 4px 12px rgba(30,20,8,0.04)',
    padding:'14px 12px',
    display:'flex', flexDirection:'column', gap:4,
    overflow:'hidden',
    ...style,
  }}>
    {/* document title-like area */}
    <div style={{height:6, background:T.text, borderRadius:1, width:'55%', marginBottom:6}}></div>
    {Array.from({length: page.lines}).map((_, i) => (
      <div key={i} style={{height:3, background:'#E5DFD0', borderRadius:1, width: `${60 + ((i*17)%35)}%`}}></div>
    ))}
    {/* page number */}
    <div style={{
      position:'absolute', bottom:8, right:10,
      fontFamily:'Geist Mono', fontSize:9, color:T.faint, letterSpacing:'0.05em',
    }}>{String(idx+1).padStart(2,'0')}</div>
    {children}
  </div>
);

// ── Common shell ───────────────────────────────────────────
const Shell = ({ children, sub }) => (
  <div style={{width:'100%',height:'100%',background:T.bg,color:T.text,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    {/* nav */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 36px',borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{fontFamily:"'Instrument Serif',serif",fontSize:24,fontStyle:'italic',letterSpacing:'-0.02em'}}>
          P<span style={{color:T.accent}}>i</span>dief
        </div>
        <div style={{fontFamily:'Geist Mono',fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',color:T.faint}}>
          / {sub}
        </div>
      </div>
      <div style={{display:'flex',gap:10,alignItems:'center'}}>
        <button style={{padding:'8px 14px',borderRadius:999,background:'transparent',color:T.muted,border:`1px solid ${T.border}`,fontFamily:'inherit',fontSize:13,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14m-7-7h14"/></svg>
          Ajouter un PDF
        </button>
        <button style={{padding:'8px 16px',borderRadius:999,background:T.text,color:'#fff',border:0,fontFamily:'inherit',fontSize:13,fontWeight:500,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6}}>
          Continuer
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
    </div>
    {children}
  </div>
);

// Eyebrow / subtitle
const Headline = ({ title, accentTitle, sub }) => (
  <div style={{padding:'24px 36px 8px',display:'flex',flexDirection:'column',gap:6}}>
    <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:38,fontWeight:400,fontStyle:'italic',letterSpacing:'-0.03em',lineHeight:1,margin:0}}>
      {title} <span style={{color:T.accent}}>{accentTitle}</span>
    </h1>
    <div style={{fontSize:13,color:T.muted}}>{sub}</div>
  </div>
);

// ──────────────────────────────────────────────────────────
// V1 — Color-coded borders + chip on each page + legend
// ──────────────────────────────────────────────────────────
const V1 = () => (
  <Shell sub="aperçu des pages">
    <Headline title="12 pages," accentTitle="3 fichiers." sub="Chaque page conserve un repère couleur de son fichier d'origine. Glissez pour réorganiser." />

    {/* Legend */}
    <div style={{padding:'12px 36px 16px',display:'flex',gap:14,flexWrap:'wrap'}}>
      {SOURCES.map(s => (
        <div key={s.id} style={{display:'inline-flex',alignItems:'center',gap:8,background:T.card,border:`1px solid ${T.border}`,borderRadius:999,padding:'5px 12px 5px 6px',fontSize:12}}>
          <div style={{width:18,height:18,borderRadius:5,background:s.color,color:'#fff',fontFamily:'Geist Mono',fontSize:9,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center'}}>{s.initials}</div>
          <span style={{color:T.text,fontWeight:500}}>{s.name}</span>
          <span style={{color:T.faint,fontFamily:'Geist Mono',fontSize:10}}>{PAGES.filter(p=>p.src===s.id).length} p.</span>
        </div>
      ))}
    </div>

    {/* Grid */}
    <div style={{flex:1,padding:'0 36px 28px',overflow:'auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(6, 1fr)',gap:18}}>
        {PAGES.map((p, idx) => {
          const s = sourceById(p.src);
          return (
            <div key={p.id} style={{position:'relative'}}>
              {/* color-coded top bar */}
              <div style={{height:4,background:s.color,borderRadius:'4px 4px 0 0'}}/>
              <PageThumb idx={idx} page={p} style={{borderRadius:'0 0 8px 8px',border:`1px solid ${T.border}`,borderTop:0}}>
                <div style={{position:'absolute',top:8,left:8,width:18,height:18,borderRadius:5,background:s.color,color:'#fff',fontFamily:'Geist Mono',fontSize:9,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center'}}>{s.initials}</div>
              </PageThumb>
            </div>
          );
        })}
      </div>
    </div>
  </Shell>
);

// ──────────────────────────────────────────────────────────
// V2 — Sectioned by source (collapsible groups)
// ──────────────────────────────────────────────────────────
const V2 = () => (
  <Shell sub="groupé par fichier">
    <Headline title="3 fichiers," accentTitle="12 pages." sub="Pages organisées par fichier source. Réorganisez à l'intérieur d'un groupe ou entre groupes." />

    <div style={{flex:1,padding:'12px 36px 28px',overflow:'auto',display:'flex',flexDirection:'column',gap:20}}>
      {SOURCES.map(s => {
        const pages = PAGES.map((p,idx)=>({...p,_idx:idx})).filter(p => p.src === s.id);
        return (
          <section key={s.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,overflow:'hidden'}}>
            {/* Section header */}
            <header style={{padding:'14px 18px',display:'flex',alignItems:'center',gap:14,background:s.tintBg,borderBottom:`1px solid ${s.tintBorder}`}}>
              <div style={{width:32,height:32,borderRadius:8,background:s.color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Geist Mono',fontSize:11,fontWeight:600}}>{s.initials}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:T.text}}>{s.name}</div>
                <div style={{fontSize:11,color:T.muted,fontFamily:'Geist Mono'}}>{pages.length} pages · ajouté à l'instant</div>
              </div>
              <button style={{padding:'5px 10px',borderRadius:6,background:'transparent',border:0,color:T.muted,fontFamily:'Geist Mono',fontSize:10,cursor:'pointer',letterSpacing:'0.08em',textTransform:'uppercase'}}>Tout sélectionner</button>
              <button style={{width:26,height:26,borderRadius:6,background:'transparent',border:0,color:T.muted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>
            </header>
            {/* Pages */}
            <div style={{padding:18,display:'grid',gridTemplateColumns:'repeat(6, 1fr)',gap:14}}>
              {pages.map(p => (
                <PageThumb key={p.id} idx={p._idx} page={p} style={{border:`1px solid ${T.border}`}} />
              ))}
            </div>
          </section>
        );
      })}
    </div>
  </Shell>
);

// ──────────────────────────────────────────────────────────
// V3 — Tinted pages (subtle background tint per source)
// ──────────────────────────────────────────────────────────
const V3 = () => (
  <Shell sub="vue teintée">
    <Headline title="Vos pages," accentTitle="par teinte." sub="Chaque fichier source colore légèrement le fond de ses pages — l'origine se lit d'un coup d'œil." />

    {/* Legend (slim) */}
    <div style={{padding:'8px 36px 16px',display:'flex',gap:20,fontSize:12,color:T.text}}>
      {SOURCES.map(s => (
        <div key={s.id} style={{display:'inline-flex',alignItems:'center',gap:8}}>
          <div style={{width: s.pattern==='lines'?18:12, height: s.pattern==='lines'?4:12, borderRadius: s.pattern==='dots'?'50%':s.pattern==='cross'?2:1, background: s.pattern==='cross'?'transparent':s.color, border: s.pattern==='cross'?`2px solid ${s.color}`:'none', flexShrink:0}}></div>
          <span style={{fontWeight:500,color:T.text}}>{s.name}</span>
          <span style={{color:T.faint,fontFamily:'Geist Mono',fontSize:10}}>{PAGES.filter(p=>p.src===s.id).length} p.</span>
        </div>
      ))}
    </div>

    <div style={{flex:1,padding:'0 36px 28px',overflow:'auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(6, 1fr)',gap:14}}>
        {PAGES.map((p, idx) => {
          const s = sourceById(p.src);
          return (
            <div key={p.id} style={{
              background:s.tintBg, border:`1px solid ${s.tintBorder}`,
              borderRadius:12, padding:10, display:'flex', flexDirection:'column', gap:8,
            }}>
              <PageThumb idx={idx} page={p} />
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <div style={{width: s.pattern==='lines'?14:10, height: s.pattern==='lines'?3:10, borderRadius: s.pattern==='dots'?'50%':s.pattern==='cross'?2:1, background: s.pattern==='cross'?'transparent':s.labelColor, border: s.pattern==='cross'?`2px solid ${s.labelColor}`:'none', flexShrink:0}}></div>
                <div style={{fontFamily:'Geist Mono',fontSize:11,color:s.labelColor,letterSpacing:'0.06em',textTransform:'uppercase',fontWeight:600}}>
                  {s.name.replace('.pdf','')}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  </Shell>
);

// ──────────────────────────────────────────────────────────
// V4 — Connected ribbon (pages of same source share a colored thread)
// ──────────────────────────────────────────────────────────
const V4 = () => (
  <Shell sub="vue ruban">
    <Headline title="Le fil," accentTitle="qui les lie." sub="Un ruban coloré relie les pages d'un même fichier — visualisez l'ordre et l'origine simultanément." />

    {/* Legend */}
    <div style={{padding:'8px 36px 12px',display:'flex',gap:16,alignItems:'center'}}>
      {SOURCES.map(s => (
        <div key={s.id} style={{display:'inline-flex',alignItems:'center',gap:7,fontSize:12,color:T.text}}>
          <div style={{width:24,height:3,background:s.color,borderRadius:2}}/>
          <span style={{fontWeight:500}}>{s.name}</span>
        </div>
      ))}
    </div>

    <div style={{flex:1,padding:'8px 36px 28px',overflow:'auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(6, 1fr)',gap:0,rowGap:24,position:'relative'}}>
        {PAGES.map((p, idx) => {
          const s = sourceById(p.src);
          const col = idx % 6;
          return (
            <div key={p.id} style={{padding:'0 8px',position:'relative'}}>
              {/* Top ribbon dot/line: connects to previous same-source visually */}
              <div style={{
                position:'absolute', top:-12, left:'50%', transform:'translateX(-50%)',
                width:10, height:10, borderRadius:'50%', background:s.color,
                border:`2px solid ${T.bg}`, zIndex:2,
              }}/>
              <div style={{
                position:'absolute', top:-7, left: col===0 ? '50%' : 0, right: col===5 ? '50%' : 0,
                height:2, background:s.color, opacity:0.25, zIndex:1,
              }}/>
              <PageThumb idx={idx} page={p} style={{border:`1px solid ${T.border}`}}>
                <div style={{position:'absolute',bottom:8,left:10,fontFamily:'Geist Mono',fontSize:9,color:s.color,fontWeight:600,letterSpacing:'0.05em'}}>{s.initials}</div>
              </PageThumb>
            </div>
          );
        })}
      </div>
    </div>
  </Shell>
);

// ──────────────────────────────────────────────────────────
// V5 — Sidebar filter + neutral grid with corner badge
// ──────────────────────────────────────────────────────────
const V5 = () => (
  <Shell sub="vue avec filtres">
    <div style={{flex:1,display:'grid',gridTemplateColumns:'240px 1fr',overflow:'hidden'}}>
      {/* Sidebar */}
      <aside style={{borderRight:`1px solid ${T.border}`,padding:'24px 20px',display:'flex',flexDirection:'column',gap:18,overflow:'auto'}}>
        <div>
          <div style={{fontFamily:'Geist Mono',fontSize:10,color:T.faint,letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:10}}>Sources</div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <button style={{textAlign:'left',padding:'8px 10px',borderRadius:8,border:0,background:T.accentBg,color:T.text,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Toutes les pages</span>
              <span style={{fontFamily:'Geist Mono',fontSize:10,color:T.muted}}>12</span>
            </button>
            {SOURCES.map(s => {
              const count = PAGES.filter(p=>p.src===s.id).length;
              return (
                <button key={s.id} style={{textAlign:'left',padding:'8px 10px',borderRadius:8,border:0,background:'transparent',fontSize:13,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:10,color:T.text}}>
                  <div style={{width:10,height:10,borderRadius:3,background:s.color,flexShrink:0}}/>
                  <span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.name}</span>
                  <span style={{fontFamily:'Geist Mono',fontSize:10,color:T.faint}}>{count}</span>
                </button>
              );
            })}
          </div>
        </div>

        <div style={{borderTop:`1px solid ${T.border}`,paddingTop:16}}>
          <div style={{fontFamily:'Geist Mono',fontSize:10,color:T.faint,letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:10}}>Tri</div>
          <div style={{display:'flex',flexDirection:'column',gap:4,fontSize:13}}>
            <label style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',cursor:'pointer'}}>
              <input type="radio" name="sort" defaultChecked style={{accentColor:T.accent}}/>
              Ordre d'import
            </label>
            <label style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',cursor:'pointer'}}>
              <input type="radio" name="sort" style={{accentColor:T.accent}}/>
              Par fichier
            </label>
            <label style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',cursor:'pointer'}}>
              <input type="radio" name="sort" style={{accentColor:T.accent}}/>
              Manuel (drag)
            </label>
          </div>
        </div>

        <button style={{marginTop:'auto',padding:'10px 14px',borderRadius:10,border:`1px dashed ${T.border}`,background:'transparent',color:T.muted,fontFamily:'inherit',fontSize:13,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:8,justifyContent:'center'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14m-7-7h14"/></svg>
          Ajouter un PDF
        </button>
      </aside>

      {/* Main */}
      <main style={{padding:'20px 28px 28px',overflow:'auto',display:'flex',flexDirection:'column',gap:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:20,fontWeight:600,color:T.text,letterSpacing:'-0.02em'}}>Toutes les pages <span style={{color:T.faint,fontWeight:400}}>· 12</span></div>
            <div style={{fontSize:12,color:T.muted,marginTop:2}}>Glissez pour réorganiser, sélectionnez pour appliquer une action.</div>
          </div>
          <div style={{display:'flex',gap:8,fontFamily:'Geist Mono',fontSize:11,color:T.muted}}>
            <button style={{padding:'5px 10px',background:T.accentBg,border:`1px solid ${T.border}`,borderRadius:6,fontFamily:'inherit',fontSize:11,color:T.text,cursor:'pointer',letterSpacing:'0.08em'}}>GRILLE</button>
            <button style={{padding:'5px 10px',background:'transparent',border:`1px solid ${T.border}`,borderRadius:6,fontFamily:'inherit',fontSize:11,color:T.muted,cursor:'pointer',letterSpacing:'0.08em'}}>LISTE</button>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(5, 1fr)',gap:14}}>
          {PAGES.map((p, idx) => {
            const s = sourceById(p.src);
            return (
              <div key={p.id} style={{position:'relative'}}>
                <PageThumb idx={idx} page={p} style={{border:`1px solid ${T.border}`}}>
                  {/* Corner ribbon */}
                  <div style={{
                    position:'absolute', top:0, right:0,
                    width:0, height:0,
                    borderTop:`28px solid ${s.color}`,
                    borderLeft:'28px solid transparent',
                  }}/>
                  <div style={{
                    position:'absolute', top:3, right:3,
                    fontFamily:'Geist Mono', fontSize:8, fontWeight:700, color:'#fff',
                    transform:'rotate(45deg)', transformOrigin:'center',
                    letterSpacing:'0.05em',
                  }}>{s.initials}</div>
                </PageThumb>
              </div>
            );
          })}
        </div>
      </main>
    </div>
  </Shell>
);

const App = () => (
  <DesignCanvas title="Pidief — Vue des pages" subtitle="5 façons de signaler l'origine de chaque page">
    <DCSection id="row" title="Variations">
      <DCArtboard id="v1" label="01 · Bordure haute + chip — légende compacte" width={1280} height={820}>
        <V1/>
      </DCArtboard>
      <DCArtboard id="v2" label="02 · Sections par fichier — groupes" width={1280} height={820}>
        <V2/>
      </DCArtboard>
      <DCArtboard id="v3" label="03 · Pages teintées — fond coloré subtil" width={1280} height={820}>
        <V3/>
      </DCArtboard>
      <DCArtboard id="v4" label="04 · Ruban relié — fil au-dessus des pages" width={1280} height={820}>
        <V4/>
      </DCArtboard>
      <DCArtboard id="v5" label="05 · Sidebar + coin coloré — vue filtrable" width={1280} height={820}>
        <V5/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
