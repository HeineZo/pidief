<section class="pi-edit">
  <header class="pi-edit__head">
    <div class="pi-edit__toolbar">
      <pi-button variant="ghost" icon="arrow-left" data-action="back">Retour</pi-button>
      <span class="pi-edit__toolbar-spacer"></span>
      <pi-button variant="ghost" icon="upload" data-action="add-pdf">Ajouter un PDF</pi-button>
      <pi-button variant="primary" icon="arrow" data-action="continue">Continuer</pi-button>
    </div>
    <h1 class="pi-edit__title">Éditez vos PDF ici</h1>
    <div class="pi-edit__legend-row">
      <div class="pi-edit__legend" data-legend></div>
      <div class="pi-edit__grid-controls">
        <label class="pi-edit__grid-label" for="grid-columns-range">Colonnes</label>
        <div class="pi-edit__grid-slider-wrap">
          <pi-icon name="grid-small" size="18" stroke="1.4"></pi-icon>
          <input
            id="grid-columns-range"
            class="pi-edit__grid-slider"
            type="range"
            min="3"
            max="10"
            step="1"
            value="6"
            data-grid-columns-slider
          />
          <pi-icon name="grid-large" size="18" stroke="1.4"></pi-icon>
          <output class="pi-edit__grid-value" for="grid-columns-range" data-grid-columns-value>6</output>
        </div>
      </div>
    </div>
  </header>
  <div class="pi-edit__scroll">
    <div class="pi-edit__grid" data-grid></div>
    <div class="pi-edit__empty" data-empty hidden>
      <p>Aucune page restante. Ajoutez un PDF pour continuer.</p>
    </div>
  </div>
  <input type="file" accept="application/pdf" multiple hidden data-add-input />
</section>
