<main class="about">
  <div class="about__inner">
    <div>
      <pi-button variant="ghost" icon="arrow-left" data-action="back" data-i18n="about.back"></pi-button>

      <section class="about-hero" aria-labelledby="about-hero-title">
        <h1 id="about-hero-title" class="about-hero__title" data-i18n-html="about.heroTitle"></h1>
        <p class="about-hero__sub" data-i18n-html="about.heroSub"></p>
        <div class="about-hero__meta">
          <span data-i18n="about.heroMetaLocal"></span>
          <span data-i18n="about.heroMetaWasm"></span>
          <span data-i18n="about.heroMetaOpen"></span>
        </div>
      </section>
    </div>

    <section class="about-privacy" aria-labelledby="about-privacy-title">
      <div class="privacy-stage" data-privacy-stage>
        <div class="privacy-stage__layout">
          <div class="privacy-stage__browser">
            <div class="privacy-stage__chrome">
              <i></i><i></i><i></i>
              <span>pidief.app</span>
            </div>
            <div class="privacy-stage__work">
              <div class="privacy-stage__file">
                <pi-icon name="file" size="14" stroke="1.8"></pi-icon>
                <span data-i18n="about.privacyFile1"></span>
              </div>
              <div class="privacy-stage__file">
                <pi-icon name="file" size="14" stroke="1.8"></pi-icon>
                <span data-i18n="about.privacyFile2"></span>
              </div>
              <div class="privacy-stage__file">
                <pi-icon name="file" size="14" stroke="1.8"></pi-icon>
                <span data-i18n="about.privacyFile3"></span>
              </div>
            </div>
          </div>

          <div class="privacy-stage__bridge" aria-hidden="true">
            <div class="privacy-stage__bridge-inner">
              <span class="privacy-stage__bridge-line"></span>
              <span class="privacy-stage__bridge-cross"></span>
            </div>
          </div>

          <div class="privacy-stage__cloud">
            <div class="privacy-stage__cloud-icon">
              <svg class="privacy-stage__cloud-svg" width="56" height="56" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor"
                  d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z" />
              </svg>
            </div>
            <span class="privacy-stage__cloud-label" data-privacy-cloud-label
              data-i18n="about.privacyCloudLabel"></span>
          </div>
        </div>
      </div>

      <div class="privacy-text">
        <h2 id="about-privacy-title" class="about__h2" data-i18n-html="about.privacyTitle"></h2>
        <p class="about__lede" data-i18n-html="about.privacyBody"></p>
      </div>
    </section>

    <section class="about-compare" aria-labelledby="about-compare-title">
      <div class="about-compare__head">
        <div>
          <h2 id="about-compare-title" class="about__h2" data-i18n-html="about.compareTitle"></h2>
        </div>
        <div class="about-compare__toggle" role="group" data-i18n-attr="aria-label:about.compareToggleAria"
          data-compare-toggle>
          <button type="button" data-competitor="iLovePDF" aria-pressed="true" aria-controls="about-compare-table"
            data-i18n="about.competitor.iLovePDF"></button>
          <button type="button" data-competitor="SmallPDF" aria-pressed="false" aria-controls="about-compare-table"
            data-i18n="about.competitor.SmallPDF"></button>
        </div>
      </div>

      <p id="about-compare-live" class="about-compare__live sr-only" aria-live="polite"></p>

      <table id="about-compare-table" class="about-table about-table--compare">
        <thead>
          <tr>
            <th scope="col" data-i18n="about.compareCriterion"></th>
            <th scope="col" data-i18n="about.comparePidief"></th>
            <th scope="col" data-competitor-name data-i18n="about.competitor.iLovePDF"></th>
          </tr>
        </thead>
        <tbody data-compare-tbody>
          <tr data-compare-row="local">
            <th scope="row">
              <span data-i18n="about.compareRow.local.label"></span>
              <small data-i18n="about.compareRow.local.desc"></small>
            </th>
            <td class="pidief" data-compare-cell="pidief" data-i18n-attr="data-mobile-label:about.comparePidief"></td>
            <td data-compare-cell="them" data-i18n-attr="data-mobile-label:about.competitor.iLovePDF"></td>
          </tr>
          <tr data-compare-row="account">
            <th scope="row">
              <span data-i18n="about.compareRow.account.label"></span>
              <small data-i18n="about.compareRow.account.desc"></small>
            </th>
            <td class="pidief" data-compare-cell="pidief" data-i18n-attr="data-mobile-label:about.comparePidief"></td>
            <td data-compare-cell="them" data-i18n-attr="data-mobile-label:about.competitor.iLovePDF"></td>
          </tr>
          <tr data-compare-row="limits">
            <th scope="row">
              <span data-i18n="about.compareRow.limits.label"></span>
              <small data-i18n="about.compareRow.limits.desc"></small>
            </th>
            <td class="pidief" data-compare-cell="pidief" data-i18n-attr="data-mobile-label:about.comparePidief"></td>
            <td data-compare-cell="them" data-i18n-attr="data-mobile-label:about.competitor.iLovePDF"></td>
          </tr>
          <tr data-compare-row="tracking">
            <th scope="row">
              <span data-i18n="about.compareRow.tracking.label"></span>
              <small data-i18n="about.compareRow.tracking.desc"></small>
            </th>
            <td class="pidief" data-compare-cell="pidief" data-i18n-attr="data-mobile-label:about.comparePidief"></td>
            <td data-compare-cell="them" data-i18n-attr="data-mobile-label:about.competitor.iLovePDF"></td>
          </tr>
          <tr data-compare-row="offline">
            <th scope="row">
              <span data-i18n="about.compareRow.offline.label"></span>
              <small data-i18n="about.compareRow.offline.desc"></small>
            </th>
            <td class="pidief" data-compare-cell="pidief" data-i18n-attr="data-mobile-label:about.comparePidief"></td>
            <td data-compare-cell="them" data-i18n-attr="data-mobile-label:about.competitor.iLovePDF"></td>
          </tr>
          <tr data-compare-row="openSource">
            <th scope="row">
              <span data-i18n="about.compareRow.openSource.label"></span>
              <small data-i18n="about.compareRow.openSource.desc"></small>
            </th>
            <td class="pidief" data-compare-cell="pidief" data-i18n-attr="data-mobile-label:about.comparePidief"></td>
            <td data-compare-cell="them" data-i18n-attr="data-mobile-label:about.competitor.iLovePDF"></td>
          </tr>
        </tbody>
      </table>

      <p class="about-compare__footnote" data-i18n="about.compareFootnote"></p>
    </section>

    <section class="about-how" aria-labelledby="about-how-title" data-how-flow>
      <div class="how-video-panel">
        <div id="about-how-video" class="how-video" data-how-video data-has-video="false">
          <video class="how-video__media" muted playsinline loop preload="metadata" data-how-video-media
            aria-hidden="true" data-i18n="about.howVideoFallback"></video>
        </div>
      </div>

      <div class="about-how__content">
        <h2 id="about-how-title" class="about__h2" data-i18n-html="about.howTitle"></h2>
        <ol class="how-list" data-how-steps>
          <li>
            <button type="button" class="how-step" data-how-step="0" data-video-src="/demo/drop-pdf.mp4"
              data-video-type="video/mp4" data-active="true" aria-current="step">
              <span class="how-step__progress" aria-hidden="true">
                <span class="how-step__progress-bar"></span>
              </span>
              <span class="how-step__copy">
                <span class="how-list__num">1</span>
                <span>
                  <span class="how-list__title" data-i18n="about.howStep1Title"></span>
                  <span class="how-list__body" data-i18n="about.howStep1Body"></span>
                </span>
              </span>
            </button>
          </li>
          <li>
            <button type="button" class="how-step" data-how-step="1" data-video-src="/demo/mupdf.mp4"
              data-video-type="video/mp4" data-active="true" aria-current="step">
              <span class="how-step__progress" aria-hidden="true">
                <span class="how-step__progress-bar"></span>
              </span>
              <span class="how-step__copy">
                <span class="how-list__num">2</span>
                <span>
                  <span class="how-list__title" data-i18n="about.howStep2Title"></span>
                  <span class="how-list__body" data-i18n="about.howStep2Body"></span>
                </span>
              </span>
            </button>
          </li>
          <li>
            <button type="button" class="how-step" data-how-step="2" data-video-src="/demo/actions.mp4"
              data-video-type="video/mp4" data-active="true" aria-current="step">
              <span class="how-step__progress" aria-hidden="true">
                <span class="how-step__progress-bar"></span>
              </span>
              <span class="how-step__copy">
                <span class="how-list__num">3</span>
                <span>
                  <span class="how-list__title" data-i18n="about.howStep3Title"></span>
                  <span class="how-list__body" data-i18n="about.howStep3Body"></span>
                </span>
              </span>
            </button>
          </li>
          <li>
            <button type="button" class="how-step" data-how-step="3" data-video-src="/demo/export.mp4"
              data-video-type="video/mp4" data-active="true" aria-current="step">
              <span class="how-step__progress" aria-hidden="true">
                <span class="how-step__progress-bar"></span>
              </span>
              <span class="how-step__copy">
                <span class="how-list__num">4</span>
                <span>
                  <span class="how-list__title" data-i18n="about.howStep4Title"></span>
                  <span class="how-list__body" data-i18n-html="about.howStep4Body"></span>
                </span>
              </span>
            </button>
          </li>
        </ol>
      </div>
    </section>

    <section class="about-features" aria-labelledby="about-features-title">
      <h2 id="about-features-title" class="about__h2" data-i18n-html="about.featuresTitle"></h2>
      <p class="about__lede" style="margin-bottom: var(--space-8)" data-i18n-html="about.featuresLede"></p>
      <div class="about-features__grid">
        <article class="about-feature">
          <span class="about-feature__icon"><pi-icon name="upload" size="18" stroke="1.8"></pi-icon></span>
          <div>
            <h3 class="about-feature__title" data-i18n="about.featMergeTitle"></h3>
            <p class="about-feature__body" data-i18n="about.featMergeBody"></p>
          </div>
        </article>
        <article class="about-feature">
          <span class="about-feature__icon"><pi-icon name="grid-large" size="18" stroke="1.8"></pi-icon></span>
          <div>
            <h3 class="about-feature__title" data-i18n="about.featReorderTitle"></h3>
            <p class="about-feature__body" data-i18n="about.featReorderBody"></p>
          </div>
        </article>
        <article class="about-feature">
          <span class="about-feature__icon"><pi-icon name="rotate" size="18" stroke="1.8"></pi-icon></span>
          <div>
            <h3 class="about-feature__title" data-i18n="about.featRotateTitle"></h3>
            <p class="about-feature__body" data-i18n="about.featRotateBody"></p>
          </div>
        </article>
        <article class="about-feature">
          <span class="about-feature__icon"><pi-icon name="trash" size="18" stroke="1.8"></pi-icon></span>
          <div>
            <h3 class="about-feature__title" data-i18n="about.featCutTitle"></h3>
            <p class="about-feature__body" data-i18n="about.featCutBody"></p>
          </div>
        </article>
        <article class="about-feature">
          <span class="about-feature__icon"><pi-icon name="paste" size="18" stroke="1.8"></pi-icon></span>
          <div>
            <h3 class="about-feature__title" data-i18n="about.featPasteTitle"></h3>
            <p class="about-feature__body" data-i18n="about.featPasteBody"></p>
          </div>
        </article>
        <article class="about-feature">
          <span class="about-feature__icon"><pi-icon name="file" size="18" stroke="1.8"></pi-icon></span>
          <div>
            <h3 class="about-feature__title" data-i18n="about.featViewTitle"></h3>
            <p class="about-feature__body" data-i18n="about.featViewBody"></p>
          </div>
        </article>
      </div>
    </section>

    <section class="about-cta" aria-labelledby="about-cta-title">
      <h2 id="about-cta-title" class="about-cta__title" data-i18n-html="about.ctaTitle"></h2>
      <p class="about-cta__sub" data-i18n-html="about.ctaSub"></p>
      <pi-button variant="primary" icon="arrow" data-action="open-app" data-i18n="about.ctaButton"></pi-button>
    </section>
  </div>
</main>
