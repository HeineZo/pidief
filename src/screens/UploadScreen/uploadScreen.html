<section class="pi-upload">
  <h1 class="pi-upload__title">Vos PDFs,<br /><em>la confidentialité en plus</em></h1>

  <p class="pi-upload__sub">
    Fusionnez, découpez, réordonnez, pivotez, bref tout ce dont vous rêviez.
    Sans inscription et en local
  </p>

  <pi-drop-zone accept=".pdf">
    <pi-button slot="actions" variant="primary" icon="upload" data-action="browse">
      Parcourir les fichiers
    </pi-button>
    <pi-button slot="actions" variant="ghost" icon="paste" data-action="paste">
      Coller
    </pi-button>
  </pi-drop-zone>

  <div class="pi-upload__files" data-files-region hidden>
    <div class="pi-upload__files-header">
      <span class="pi-upload__files-count" data-count></span>
      <button type="button" class="pi-upload__files-clear" data-clear>Tout retirer</button>
    </div>
    <div class="pi-upload__chips" data-chips></div>
    <div class="pi-upload__cta" data-continue-cta>
      <pi-button variant="accent" icon="arrow" data-action="continue">
        Commencer la modification
      </pi-button>
    </div>
  </div>
</section>
