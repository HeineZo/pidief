<section class="pi-upload">
  <h1 class="pi-upload__title" aria-label="Vos PDFs, la confidentialité en plus">
    <span aria-hidden="true"><span class="pi-upload__title-lead">Vos PDFs,</span><br /><span class="pi-upload__title-row"><span class="pi-upload__title-soft">la</span>
      <span class="pi-upload__badge pi-upload__badge--square">
        <pi-icon name="lock" size="56" stroke="2"></pi-icon>
      </span>
      <span class="pi-upload__title-soft">en</span>
      <span class="pi-upload__badge pi-upload__badge--circle">
        <pi-icon name="plus" size="60" stroke="2.4"></pi-icon>
      </span>
    </span></span>
    <span class="sr-only">Vos PDFs, la confidentialité en plus</span>
  </h1>

  <p class="pi-upload__sub">
    Fusionnez, découpez, réordonnez, pivotez, bref tout ce dont vous rêviez.
    Sans inscription et en local
  </p>

  <pi-drop-zone accept=".pdf">
    <pi-button slot="actions" variant="primary" data-action="browse">
      Choisir un fichier
    </pi-button>
    <pi-button slot="actions" variant="ghost" icon="paste" data-action="paste">
      Coller
    </pi-button>
  </pi-drop-zone>

  <div class="pi-upload__files" data-files-region hidden>
    <div class="pi-upload__files-header">
      <span class="pi-upload__files-count" data-count></span>
      <button type="button" class="pi-upload__files-clear" data-clear>Tout retirer</button>
    </div>
    <div class="pi-upload__chips" data-chips></div>
    <div class="pi-upload__cta" data-continue-cta>
      <pi-button variant="accent" icon="arrow" data-action="continue">
        Commencer la modification
      </pi-button>
    </div>
  </div>
</section>
