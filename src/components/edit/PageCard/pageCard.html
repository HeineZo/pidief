<div class="pi-page-card">
  <header class="pi-page-card__title-bar">
    <i class="pi-pattern" data-pattern aria-hidden="true"></i>
    <span class="pi-page-card__label" data-label></span>
  </header>
  <div class="pi-page-card__actions-frame" data-actions-frame>
    <span class="pi-page-card__actions-handle" aria-hidden="true"></span>
    <div
      class="pi-page-card__actions"
      data-actions
      role="toolbar"
      aria-label="Actions de la page"
    >
      <button
        type="button"
        class="pi-page-card__action"
        data-action="rotate"
        title="Pivoter 90°"
        aria-label="Pivoter de 90 degrés"
      >
        <pi-icon name="rotate" size="14"></pi-icon>
      </button>
      <button
        type="button"
        class="pi-page-card__action pi-page-card__action--danger"
        data-action="delete"
        title="Supprimer"
        aria-label="Supprimer la page"
      >
        <pi-icon name="trash" size="14"></pi-icon>
      </button>
    </div>
  </div>
  <div class="pi-page-card__shell">
    <div class="pi-page-card__canvas-wrap" data-canvas-wrap>
      <canvas class="pi-page-card__canvas" data-canvas draggable="false"></canvas>
    </div>
    <div class="pi-page-card__num" data-num aria-hidden="true"></div>
  </div>
</div>
