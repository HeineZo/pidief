<div class="pi-file-chip" data-error="__ERROR__">
  <span class="pi-file-chip__icon">
    <pi-icon name="file" size="13" stroke="2.5"></pi-icon>
  </span>
  <span class="pi-file-chip__body">
    <span class="pi-file-chip__name" title="__NAME_ATTR__">__NAME__</span>
    <span class="pi-file-chip__meta">__META__</span>
  </span>
  <button type="button" class="pi-file-chip__remove" aria-label="__REMOVE_ARIA__">
    <pi-icon name="x" size="8" stroke="3"></pi-icon>
  </button>
</div>
